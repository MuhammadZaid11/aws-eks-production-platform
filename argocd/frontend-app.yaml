apiVersion: argoproj.io/v1alpha1

kind: Application

metadata:
  name: frontend

  namespace: argocd

spec:

  project: default

  source:

    repoURL: https://github.com/MuhammadZaid11/aws-eks-production-platform.git

    targetRevision: main

    path: helm/frontend

  destination:

    server: https://kubernetes.default.svc

    namespace: ecommerce

  syncPolicy:

    automated:

      prune: true

      selfHeal: true