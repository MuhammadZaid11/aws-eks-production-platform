replicaCount: 2

image:
  repository: ""  # Set to: <AWS_ACCOUNT_ID>.dkr.ecr.<AWS_REGION>.amazonaws.com/backend
  pullPolicy: Always
  tag: "latest"   # Overridden by CI with github.sha

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: false
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1001
  fsGroup: 1001

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 5000

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: backend.example.com
      paths:
        - path: /api
          pathType: Prefix
  tls: []

httpRoute:
  enabled: false
  annotations: {}
  parentRefs:
    - name: gateway
      sectionName: http
  hostnames:
    - backend.example.com
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

livenessProbe:
  httpGet:
    path: /api/health
    port: http
  initialDelaySeconds: 20
  periodSeconds: 20

readinessProbe:
  httpGet:
    path: /api/health
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

env:
  - name: NODE_ENV
    value: "production"
  - name: PORT
    value: "5000"
  # Database — set via Kubernetes Secret in production
  - name: DB_HOST
    value: ""
  - name: DB_NAME
    value: "ecommerce"
  - name: DB_USER
    valueFrom:
      secretKeyRef:
        name: backend-db-secret
        key: username
  - name: DB_PASS
    valueFrom:
      secretKeyRef:
        name: backend-db-secret
        key: password
  # Redis
  - name: REDIS_URL
    valueFrom:
      secretKeyRef:
        name: backend-redis-secret
        key: url
  # JWT
  - name: JWT_SECRET
    valueFrom:
      secretKeyRef:
        name: backend-jwt-secret
        key: secret

volumes: []
volumeMounts: []

nodeSelector: {}
tolerations: []
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: backend
          topologyKey: kubernetes.io/hostname
